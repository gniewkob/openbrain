name: openbrain

# UWAGA: postgres + redis na BIND MOUNTACH (./data/...) — chroni przed `docker volume prune` / CleanMyMac.
# Backup robi scripts/backup_postgres.sh (uruchamiany przez launchd, używa docker exec).

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: openbrain-unified-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - net_unified
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: openbrain-unified-redis
    volumes:
      - ./data/redis:/data
    networks:
      - net_unified
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: ./unified
    container_name: openbrain-unified-migrate
    volumes:
      - ./unified:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    command: alembic upgrade head
    networks:
      - net_unified
    depends_on:
      db:
        condition: service_healthy

  unified-server:
    build:
      context: ./unified
    container_name: openbrain-unified-server
    volumes:
      - ./unified:/app
      - "${OBSIDIAN_PERSONAL_VAULT}:/obsidian/Documents:ro"
      - "${OBSIDIAN_WORK_VAULT}:/obsidian/Work:ro"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - OLLAMA_URL=http://host.docker.internal:11434
      - REDIS_URL=redis://redis:6379/0
      - PUBLIC_MODE=${PUBLIC_MODE:-false}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - OBSIDIAN_CLI_COMMAND=${OBSIDIAN_CLI_COMMAND:-obsidian}
      - OBSIDIAN_VAULT_PATHS=${OBSIDIAN_VAULT_PATHS:-}
    ports:
      - "127.0.0.1:7010:80"
    networks:
      - net_unified
      - net_shared_monitoring
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-http:
    build:
      context: ./unified
      dockerfile: mcp-gateway/Dockerfile
    container_name: openbrain-mcp-http
    environment:
      - BRAIN_URL=http://unified-server:80
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - MCP_HTTP_PORT=7011
      - REDIS_URL=redis://redis:6379/1
    ports:
      - "127.0.0.1:7011:7011"
    networks:
      - net_unified
    depends_on:
      - unified-server
      - redis
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: openbrain-unified-ngrok
    # Opt-in only: `docker compose --profile public up ngrok`.
    # Wystawia gateway publicznie bez auth — nigdy nie odpalaj przez zwykłe `up`.
    profiles: ["public"]
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "http://mcp-http:7011"
      - "--url=${NGROK_DOMAIN}"
    networks:
      - net_unified
    depends_on:
      - mcp-http
    restart: unless-stopped

networks:
  net_unified:
    name: net_unified
    driver: bridge
  net_shared_monitoring:
    external: true
