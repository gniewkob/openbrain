networks:
  net_unified:
    name: openbrain_net_unified
    driver: bridge

volumes:
  openbrain_unified_data:
  openbrain_ollama:
  openbrain_grafana_data:
  openbrain_prometheus_data:

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: openbrain-unified-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - openbrain_unified_data:/var/lib/postgresql/data
    networks:
      - net_unified
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./unified
    container_name: openbrain-unified-migrate
    working_dir: /app
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      - net_unified
    depends_on:
      db:
        condition: service_healthy

  unified-server:
    build:
      context: ./unified
    container_name: openbrain-unified-server
    volumes:
      - ./unified:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - OLLAMA_URL=http://embedding-service:11434
      - BRAIN_URL=http://127.0.0.1:80
      - PUBLIC_MODE=${PUBLIC_MODE:-false}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-https://openbrain-mcp}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
    ports:
      - "127.0.0.1:7010:80"
    networks:
      - net_unified
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  embedding-service:
    image: ollama/ollama:latest
    container_name: openbrain-unified-ollama
    volumes:
      - openbrain_ollama:/root/.ollama
    networks:
      - net_unified

  ngrok:
    image: ngrok/ngrok:latest
    container_name: openbrain-unified-ngrok
    profiles: ["public"]
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "unified-server:80"
    networks:
      - net_unified
    depends_on:
      - unified-server
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: openbrain-unified-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - openbrain_prometheus_data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/prometheus-alerts.yml:/etc/prometheus/openbrain-alerts.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - net_unified
    depends_on:
      - unified-server
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.5
    container_name: openbrain-unified-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - openbrain_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    networks:
      - net_unified
    depends_on:
      - prometheus
    restart: unless-stopped
