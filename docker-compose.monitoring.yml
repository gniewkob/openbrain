services:
  metrics-bridge:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.bridge
    container_name: shared-metrics-bridge
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - METRICS_UPSTREAM_URL=http://openbrain-unified-server:80/metrics
      - METRICS_LISTEN_HOST=0.0.0.0
      - METRICS_LISTEN_PORT=9180
    ports:
      - "127.0.0.1:9180:9180"
    networks:
      - net_shared_monitoring
      - net_unified
    restart: unless-stopped

networks:
  net_shared_monitoring:
    external: true
  net_unified:
    external: true
