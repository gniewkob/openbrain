# OpenBrain Pre-commit Configuration
# Install: pip install pre-commit && pre-commit install
#
# This ensures code quality before each commit.
# To skip hooks temporarily: git commit --no-verify

repos:
  # Ruff - linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        name: Ruff linter
        args: [--fix, --exit-non-zero-on-fix]
        files: ^unified/
        exclude: ^unified/migrations/
      - id: ruff-format
        name: Ruff formatter
        files: ^unified/
        exclude: ^unified/migrations/

  # Mypy - static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        name: Mypy type check
        files: ^unified/src/
        exclude: ^unified/(migrations|tests)/
        additional_dependencies:
          - pydantic>=2.0
          - sqlalchemy>=2.0
          - fastapi>=0.115
          - types-redis
          - types-python-jose
        args:
          - --ignore-missing-imports
          - --show-error-codes
          - --strict

  # Bandit - security linting
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        name: Bandit security check
        files: ^unified/src/
        exclude: ^unified/(tests|migrations)/
        args:
          - -r
          - -ll
          - -ii
          - -c
          - pyproject.toml

  # TruffleHog - secret scanning
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.82.12
    hooks:
      - id: trufflehog
        name: TruffleHog secret scan
        entry: trufflehog
        language: system
        args:
          - git
          - file://.
          - --since-commit
          - HEAD
          - --only-verified
          - --fail

  # Local hooks
  - repo: local
    hooks:
      # Check for committed secrets (custom script)
      - id: check-secrets
        name: Check for committed secrets (custom)
        entry: python scripts/check_no_committed_secrets.py
        language: system
        pass_filenames: false
        files: .*
        stages: [pre-commit]

      # Check Docker Compose guardrails
      - id: compose-guardrails
        name: Check Docker Compose guardrails
        entry: python scripts/check_compose_guardrails.py
        language: system
        pass_filenames: false
        files: docker-compose.*\.ya?ml$
        stages: [pre-commit]

      # Run unified tests
      - id: unified-tests
        name: Run unified unit tests
        entry: bash -c 'cd unified && uv run pytest tests/ -x -q --tb=line --ignore=tests/integration --ignore=tests/test_api_endpoints_live.py 2>/dev/null || echo "⚠️  Tests failed - commit anyway with --no-verify"'
        language: system
        pass_filenames: false
        files: ^unified/
        stages: [pre-push]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^unified/migrations/
      - id: end-of-file-fixer
        exclude: ^unified/migrations/
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: forbid-new-submodules

# Configuration
default_language_version:
  python: python3.12

default_stages: [pre-commit, pre-push]

# Fail fast - stop on first error
fail_fast: true
