groups:
  - name: openbrain-operational-health
    rules:
      - alert: OpenBrainOperationalHealthElevated
        expr: operational_health_status{job="openbrain-unified"} >= 2
        for: 10m
        labels:
          severity: critical
          service: openbrain-unified
        annotations:
          summary: "OpenBrain operational health is elevated"
          description: "The service reports elevated operational health pressure for at least 10 minutes. Check /api/diagnostics/metrics summary and recent maintain reports."

      - alert: OpenBrainOperationalHealthWatch
        expr: operational_health_status{job="openbrain-unified"} >= 1
        for: 30m
        labels:
          severity: warning
          service: openbrain-unified
        annotations:
          summary: "OpenBrain operational health is in watch state"
          description: "The service reports sustained watch-level operational pressure. Review policy skips, duplicate candidates, and search zero-hit ratio."

  - name: mailai-operational-health
    rules:
      - alert: MailAIOperationalHealthElevated
        expr: operational_health_status{job="mailai"} >= 2
        for: 10m
        labels:
          severity: critical
          service: mailai
        annotations:
          summary: "mAiL operational health is elevated"
          description: "The mail routing service reports elevated operational pressure for at least 10 minutes. Check recent mailai state, cleanup backlog, and auth or mailbox failures."

      - alert: MailAIOperationalHealthWatch
        expr: operational_health_status{job="mailai"} >= 1
        for: 30m
        labels:
          severity: warning
          service: mailai
        annotations:
          summary: "mAiL operational health is in watch state"
          description: "The mail routing service reports sustained watch-level pressure. Review uncertain backlog and recent routing anomalies before they escalate."

  - name: macmini-host-canary
    rules:
      - alert: MacMiniHostCanaryFailed
        expr: macmini_canary_status{scope="full"} >= 2
        for: 5m
        labels:
          severity: critical
          service: macmini-host
        annotations:
          summary: "Mac Mini host canary failed"
          description: "The combined host canary is in failed state for at least 5 minutes. Check openbrain, mailai, Docker, launchd, and public ingress health."

      - alert: MacMiniHostCanaryWatch
        expr: macmini_canary_status{scope="full"} >= 1
        for: 15m
        labels:
          severity: warning
          service: macmini-host
        annotations:
          summary: "Mac Mini host canary is in watch state"
          description: "The combined host canary has been in watch state for at least 15 minutes. Review service canary and resource canary outputs before it escalates."

      - alert: MacMiniHostCanaryMetricsStale
        expr: time() - macmini_canary_last_run_timestamp_seconds > 900
        for: 5m
        labels:
          severity: warning
          service: macmini-host
        annotations:
          summary: "Mac Mini host canary metrics are stale"
          description: "The host canary metrics file has not been refreshed for more than 15 minutes. Check the launchd runner and host-full-canary logs."

  - name: openbrain-governance
    rules:
      - alert: OpenBrainPolicySkipPressure
        expr: policy_skip_per_maintain_run_ratio >= policy_skip_per_maintain_run_ratio_elevated_threshold
        for: 15m
        labels:
          severity: warning
          service: openbrain-unified
        annotations:
          summary: "OpenBrain governance is blocking mutations frequently"
          description: "Policy skips per maintain run are at or above elevated threshold. Inspect maintain reports for policy_skip reasons and upstream pipeline behavior."

      - alert: OpenBrainDuplicatePressure
        expr: duplicate_candidates_per_maintain_run_ratio >= duplicate_candidates_per_maintain_run_ratio_elevated_threshold
        for: 15m
        labels:
          severity: warning
          service: openbrain-unified
        annotations:
          summary: "OpenBrain duplicate pressure is elevated"
          description: "Duplicate candidates per maintain run exceed the elevated threshold. Investigate ingestion paths and match_key stability."

      - alert: OpenBrainDeletePolicyViolations
        expr: increase(policy_skip_delete_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
          service: openbrain-unified
        annotations:
          summary: "Attempted hard delete of append-only memories"
          description: "At least one delete attempt was blocked by governance in the last hour. Review caller behavior and delete expectations."

      - alert: OpenBrainHiddenTestDataPresent
        expr: hidden_test_data_active_total > 0
        for: 15m
        labels:
          severity: warning
          service: openbrain-unified
        annotations:
          summary: "Hidden test data present in active memory set"
          description: "There are active records flagged as metadata.test_data=true; verify cleanup/quarantine posture and retrieval filters."

      - alert: OpenBrainHiddenTestDataShareHigh
        expr: hidden_test_data_active_total / clamp_min(active_memories_all_total, 1) >= 0.25
        for: 15m
        labels:
          severity: warning
          service: openbrain-unified
        annotations:
          summary: "Hidden test-data share is elevated"
          description: "Hidden test-data active share is at or above 25%. Prioritize test-data hygiene cleanup to preserve dashboard and retrieval trust."

  - name: openbrain-retrieval
    rules:
      - alert: OpenBrainSearchZeroHitRateElevated
        expr: search_zero_hit_ratio >= search_zero_hit_ratio_elevated_threshold
        for: 30m
        labels:
          severity: warning
          service: openbrain-unified
        annotations:
          summary: "OpenBrain retrieval zero-hit ratio is elevated"
          description: "Search zero-hit ratio is above the elevated threshold. Review ingestion freshness, duplicate pressure, and query quality."

      - alert: OpenBrainSyncMissingSpike
        expr: increase(sync_missing_total[1h]) > 10
        for: 0m
        labels:
          severity: warning
          service: openbrain-unified
        annotations:
          summary: "OpenBrain sync missing spike detected"
          description: "More than 10 missing sync checks were observed in the last hour. Check sync pipelines and identity strategy."
