global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/openbrain-alerts.yml

scrape_configs:
  - job_name: openbrain-unified
    metrics_path: /metrics
    static_configs:
      - targets:
          # Bridge proxy running on host at 127.0.0.1:9180.
          # It adds X-Internal-Key and forwards to unified-server.
          # See monitoring/openbrain-metrics-bridge.py
          - metrics-bridge:9180

  - job_name: mailai
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9177

  - job_name: salonbw-api
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - api.salon-bw.pl
