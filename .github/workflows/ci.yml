name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        cd unified
        python -m pip install --upgrade pip
        pip install ruff
    
    - name: Lint with Ruff
      run: |
        cd unified
        ruff check src/
        ruff format --check src/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: openbrain_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        cd unified
        uv sync --group dev

    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres@localhost:5432/openbrain_test
        DISABLE_SECRET_SCANNING: "1"
      run: |
        cd unified
        uv run pytest tests/ -v --tb=short -x \
          --cov=src --cov-report=term-missing --cov-fail-under=90 \
          --ignore=tests/integration \
          --ignore=tests/test_api_endpoints_live.py \
          --ignore=tests/test_endpoints_summary.py

  typecheck:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        cd unified
        uv sync --group dev

    - name: Run mypy
      run: |
        cd unified
        uv run mypy src/ --config-file pyproject.toml

  contract-integrity:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio
        pip install -e ./unified
        pip install -e ./unified/mcp-gateway

    - name: Run unified contract integrity
      run: |
        python -m pytest -q \
          unified/tests/test_contract_integrity.py \
          unified/tests/test_capabilities_response_contract.py

    - name: Run gateway contract integrity
      run: |
        python -m unittest discover -s unified/mcp-gateway/tests -p "test_gateway_contract_integrity.py" -v
        python -m unittest discover -s unified/mcp-gateway/tests -p "test_gateway_capabilities_response_contract.py" -v

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
    
    - name: Audit dependencies
      run: |
        cd unified
        pip-audit --desc --format=json
