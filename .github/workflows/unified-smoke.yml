name: Unified Smoke Tests

on:
  push:
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:

      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install unified package for security tests
        run: pip install -e ./unified
      - name: Install ruff
        run: pip install ruff
      - name: Run syntax and undefined-name checks
        run: ruff check --select E9,F63,F7,F82 unified unified/mcp-gateway scripts
      - name: Scan tracked files for committed secrets
        run: python scripts/check_no_committed_secrets.py
      - name: Verify compose guardrails
        run: python scripts/check_compose_guardrails.py
      - name: Verify public-mode startup guardrails
        run: python -m unittest unified.tests.test_auth_security unified.tests.test_db_security

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: unified
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Install gateway package
        run: pip install -e mcp-gateway
      - name: Run smoke tests
        run: python -m unittest discover -s tests -v

  gateway-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: unified/mcp-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gateway package
        run: pip install -e .
      - name: Run gateway tests
        run: python -m unittest discover -s tests -v

  transport-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install unified package
        run: pip install -e ./unified
      - name: Install gateway package
        run: pip install -e ./unified/mcp-gateway
      - name: Run transport parity tests
        run: PYTHONPATH=.:unified python -m unittest unified.tests.test_transport_parity -v
